version: 2.1

orbs:
  sonarcloud: sonarsource/sonarcloud@2.0.0
  node: circleci/node@5.2

jobs:
  install:
    docker:
      - image: cimg/node:22.15
    steps:
      - checkout
      - restore_cache:
          keys:
            - v1-backend-{{ checksum "backend/package-lock.json" }}
            - v1-backend-
      - restore_cache:
          keys:
            - v1-customer-{{ checksum "customer-portal/package-lock.json" }}
            - v1-customer-
      - restore_cache:
          keys:
            - v1-employee-{{ checksum "employee-portal/package-lock.json" }}
            - v1-employee-
      - run:
          name: Install backend dependencies
          command: cd backend && npm ci
      - run:
          name: Install customer portal dependencies
          command: cd customer-portal && npm ci
      - run:
          name: Install employee portal dependencies
          command: cd employee-portal && npm ci
      - save_cache:
          paths:
            - backend/node_modules
          key: v1-backend-{{ checksum "backend/package-lock.json" }}
      - save_cache:
          paths:
            - customer-portal/node_modules
          key: v1-customer-{{ checksum "customer-portal/package-lock.json" }}
      - save_cache:
          paths:
            - employee-portal/node_modules
          key: v1-employee-{{ checksum "employee-portal/package-lock.json" }}
      - persist_to_workspace:
          root: .
          paths:
            - backend/node_modules
            - customer-portal/node_modules
            - employee-portal/node_modules

  sast:
    docker:
      - image: cimg/node:22.15
    resource_class: large
    steps:
      - checkout
      - attach_workspace:
          at: .
      - run:
          name: Download SonarScanner
          command: |
            curl -sSLo /tmp/sonar.zip https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-5.0.1.3006-linux.zip
            unzip -q /tmp/sonar.zip -d /tmp
      - run:
          name: SonarCloud scan
          no_output_timeout: 25m
          command: |
            /tmp/sonar-scanner-5.0.1.3006-linux/bin/sonar-scanner \
              -Dsonar.token=$SONAR_TOKEN \
              -Dsonar.verbose=false 2>&1 | tee /tmp/sonar.log
            STATUS=${PIPESTATUS[0]}
            if [ "$STATUS" -ne 0 ]; then
              echo "===== Scanner exited with status $STATUS ====="
              tail -100 /tmp/sonar.log
              exit $STATUS
            fi

  sca:
    docker:
      - image: cimg/node:22.15
    steps:
      - checkout
      - attach_workspace:
          at: .
      - run:
          name: Software composition analysis — backend
          command: cd backend && npm audit --audit-level=high --omit=dev || true
      - run:
          name: Software composition analysis — customer portal
          command: cd customer-portal && npm audit --audit-level=high || true
      - run:
          name: Software composition analysis — employee portal
          command: cd employee-portal && npm audit --audit-level=high || true
      - run:
          name: SCA summary
          command: |
            echo "Software Composition Analysis complete."
            echo "Vulnerabilities at 'high' or 'critical' level would fail the build in strict mode."

  api-test:
    docker:
      - image: cimg/node:22.15
    steps:
      - checkout
      - attach_workspace:
          at: .
      - run:
          name: API smoke test (security headers, role checks, validation)
          command: |
            cd backend
            export JWT_SECRET=$(node -e "console.log(require('crypto').randomBytes(64).toString('hex'))")
            export NODE_ENV=test
            node test/api-smoke.js

  build:
    docker:
      - image: cimg/node:22.15
    steps:
      - checkout
      - attach_workspace:
          at: .
      - run:
          name: Build customer portal
          command: cd customer-portal && npm run build
      - run:
          name: Build employee portal
          command: cd employee-portal && npm run build

workflows:
  devsecops:
    jobs:
      - install
      - sast:
          context: SonarCloud
          requires:
            - install
      - sca:
          requires:
            - install
      - api-test:
          requires:
            - install
      - build:
          requires:
            - install
