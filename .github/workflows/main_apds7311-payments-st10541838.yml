name: Build and deploy Node.js app to Azure Web App - apds7311-payments-st10541838

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci --omit=dev

      - name: Install and build customer portal
        working-directory: customer-portal
        run: |
          npm ci
          npm run build

      - name: Install and build employee portal
        working-directory: employee-portal
        run: |
          npm ci
          npm run build

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'apds7311-payments-st10541838'
          slot-name: 'Production'
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: .
