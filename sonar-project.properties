sonar.organization=geniustaku
sonar.projectKey=geniustaku_ST10541838-APDS7311-PaymentsPortal
sonar.projectName=International Payments Portal
sonar.host.url=https://sonarcloud.io

sonar.sources=backend,customer-portal/src,employee-portal/src
sonar.tests=backend/test
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/ssl/**,**/*.test.js,**/coverage/**,**/lib/**,**/wwwroot/**

# Cap the JavaScript scanner's memory so it does not OOM in CI.
sonar.javascript.node.maxspace=4096

# Limit the JS Security taint sensor to the actual backend (where injection sinks live).
# The React portals are read-only consumers; their security risk is covered by the JS analyzer rules.
sonar.security.javascript.includes=backend/**/*.js

sonar.sourceEncoding=UTF-8
